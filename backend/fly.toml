# fly.toml — run `fly launch` then `fly deploy` to ship
app = "mailblast-backend"
primary_region = "sin"

[build]

[env]
  PORT = "3001"
  DB_PATH = "/data/email_tool.db"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "mailblast_data"
  destination = "/data"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
